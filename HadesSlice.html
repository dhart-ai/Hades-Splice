<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; background:#0e0a12; }
  canvas { display:block; margin:40px auto; background:#1c1620; border:2px solid #7a5a2a; }
</style>
</head>
<body>
<canvas id="canvas" width="900" height="560"></canvas>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let lastTime = performance.now();

// --- Game phase / round state ---
// 'fighting' = combat active | 'boon' = pick a boon | 'won' | 'lost'
let gamePhase = "fighting";
let roundIndex = 0;

// Round composition: how many Shades/Wretches spawn each round
const ROUNDS = [
  { shades: 2, wretches: 0 },
  { shades: 0, wretches: 1 },
  { shades: 2, wretches: 2 }
];

const PRIMARY_ATTACK_DAMAGE = 20; 

// --- Assets ---
const characterImg = new Image();
characterImg.src = "Hadescharacter slice.png"; // character image for the player

// --- Player ---
const player = {
  x: 450,
  y: 280,
  radius: 16,
  speed: 220,   // movement speed in pixels per second
  facing: 0,    // angle in radians, always toward the mouse
  health: 100,
  maxHealth: 100
};

// Boon levels — 0 means not picked yet; each pick adds +25% proc chance
player.boons = { zeus: 0, poseidon: 0, artemis: 0 };

// --- Mouse tracking (canvas-relative coords) ---
const mouse = { x: 0, y: 0 };
canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

// --- Attack state ---
let attackTimer = 0;
const attackDuration = 0.15; // hitbox lifetime after a click
const attackRange = 50;      // hitbox distance in front of player

canvas.addEventListener("click", (e) => {
  if (gamePhase === "boon") {
    handleBoonClick(e);
    return;
  }
  if (gamePhase === "won" || gamePhase === "lost") { // check for end screen click
    handleRestartClick(e); // handle click on the restart button
    return;
  }
  if (gamePhase !== "fighting") return; // no attacking on won/lost screens
  if (attackTimer <= 0) attackTimer = attackDuration; // ignore clicks mid-swing
});

// --- Input tracking ---
const keys = {};
window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

// --- Dash state ---
const dash = {
  active: false,
  timer: 0,
  duration: 0.25,  
  speed: 600,
  cooldown: 0,
  cooldownDuration: 0.5, 
  dirX: 0, dirY: 0,      // locked in when dash starts
  invulnerable: false    // true during dash.active = i-frames
};

window.addEventListener("keydown", (e) => {
  if (e.key !== " ") return;
  if (gamePhase !== "fighting") return;
  if (dash.active || dash.cooldown > 0) return;

  dash.active = true;
  dash.timer = dash.duration;
  dash.invulnerable = true;

  // Dash toward held movement keys; fall back to facing (mouse) if none held
  let dirX = 0, dirY = 0;
  if (keys["w"] || keys["arrowup"]) dirY -= 1;
  if (keys["s"] || keys["arrowdown"]) dirY += 1;
  if (keys["a"] || keys["arrowleft"]) dirX -= 1;
  if (keys["d"] || keys["arrowright"]) dirX += 1;
  if (dirX === 0 && dirY === 0) {
    dirX = Math.cos(player.facing);
    dirY = Math.sin(player.facing);
  }

  const length = Math.sqrt(dirX * dirX + dirY * dirY);
  dash.dirX = length > 0 ? dirX / length : 0; // normalize so diagonals aren't faster
  dash.dirY = length > 0 ? dirY / length : 0;
});


let damageNumbers = [];   // { x, y, value, crit, timer, speed }
let slashFlashTimer = 0;  // brief white flash on a successful hit
let shakeTimer = 0;       // brief screen shake on a successful hit / player hit
const shakeMagnitude = 6; // px

// FIX: was called in 3 places but never defined
function spawnDamageNumber(x, y, value, crit) {
  damageNumbers.push({
    x, y,
    value,
    crit, // whether this hit was a critical strike
    timer: 0.6, 
    speed: 40  // speed in pixels per second
  });
}

// --- Enemy factories ---
// Each enemy carries its own state so multiple can exist per round.
function createShade(x, y) {
  return {
    type: "shade",
    x, y,
    radius: 18,
    state: "idle",
    stateTimer: 0,
    telegraphDuration: 0.6,  
    lungeDuration: 0.25,
    lungeSpeed: 500,
    cooldownDuration: 0.8,
    lungeDirX: 0, lungeDirY: 0,
    chaseSpeed: 120,
    aggroRange: 400,
    attackRange: 60,
    health: 40,               
    maxHealth: 40,
    hitThisSwing: false,
    hitPlayerThisLunge: false,
    staggerTimer: 0,          // Poseidon boon knockback/stun window
    dead: false
  };
}

function createWretch(x, y) {
  return {
    type: "wretch",
    x, y,
    radius: 18,
    state: "idle",
    stateTimer: 0,
    telegraphDuration: 0.7, 
    cooldownDuration: 0.5,
    aggroRange: 450,
    preferredRange: 250,
    retreatSpeed: 200,
    health: 30,               
    maxHealth: 30,
    hitThisSwing: false,
    staggerTimer: 0,
    dead: false
  };
}

let shades = [];
let wretches = [];
const projectiles = []; // { x, y, dirX, dirY, speed, radius }

function spawnRound(index) {
  shades = [];
  wretches = [];
  projectiles.length = 0;
  damageNumbers.length = 0; //

  const config = ROUNDS[index];
  const shadeSpawns = [{ x: 700, y: 150 }, { x: 200, y: 150 }, { x: 700, y: 450 }, { x: 200, y: 450 }];
  const wretchSpawns = [{ x: 150, y: 500 }, { x: 750, y: 500 }, { x: 150, y: 80 }, { x: 750, y: 80 }];

  for (let i = 0; i < config.shades; i++) shades.push(createShade(shadeSpawns[i].x, shadeSpawns[i].y));
  for (let i = 0; i < config.wretches; i++) wretches.push(createWretch(wretchSpawns[i].x, wretchSpawns[i].y));

  gamePhase = "fighting";
}

spawnRound(0); // kick off Round 1

function allDead(list) {
  return list.every(e => e.dead);
}

function checkRoundClear() {
  if (gamePhase !== "fighting") return;
  if (!allDead(shades) || !allDead(wretches)) return;

  if (roundIndex < ROUNDS.length - 1) {
    gamePhase = "boon"; // offer a boon before the next round
  } else {
    gamePhase = "won"; // final round cleared
  }
}

// --- Boon system ---
const BOONS = [
  { id: "zeus", name: "Zeus — Chain Lightning", desc: "Attacks have a chance to arc to a nearby enemy.", color: "#ffe066" },
  { id: "poseidon", name: "Poseidon — Tempest Strike", desc: "Attacks have a chance to knock back & stagger.", color: "#4fc3f7" },
  { id: "artemis", name: "Artemis — Deadly Strike", desc: "Attacks have a chance to critically strike.", color: "#81c784" }
];

let boonCardRects = []; // stores the clickable areas for boon cards
let restartButtonRect = null; // set by renderEndScreen(), checked by handleRestartClick()


function handleBoonClick(e) {
  const rect = canvas.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;

  for (const card of boonCardRects) {
    if (clickX >= card.x && clickX <= card.x + card.w && clickY >= card.y && clickY <= card.y + card.h) {
      player.boons[card.id] += 1; // stacking a god raises its proc chance
      roundIndex += 1;
      spawnRound(roundIndex);
      return;
    }
  }
}

// Applies boon procs on top of a base melee hit. Called once per successful swing.
function applyBoonEffects(target, baseDamage) {
  let damage = baseDamage;
  let crit = false;   // tracks whether this hit crit, so the display can style it differently

  // Artemis — chance to crit for double damage
  if (player.boons.artemis > 0 && Math.random() < player.boons.artemis * 0.25) { // chance to crit
    damage *= 2;
    crit = true; // mark this hit as a critical strike
  }

  target.health -= damage;
  if (target.health <= 0) target.dead = true;
  spawnDamageNumber(target.x, target.y - target.radius - 6, damage, crit); // show damage number at enemy position
  slashFlashTimer = 0.12;// trigger a brief slash flash for visual feedback
  shakeTimer = 0.1; // FIX: give shakeTimer an actual trigger (it was declared-nowhere before, and now that it exists it still needs something to set it)

  // Poseidon — chance to knock back and briefly stagger the target
  if (player.boons.poseidon > 0 && Math.random() < player.boons.poseidon * 0.25) { // chance to knock back and stagger
    const dx = target.x - player.x; // direction vector from player to target
    const dy = target.y - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1; // prevent division by zero
    target.x = Math.max(target.radius, Math.min(canvas.width - target.radius, target.x + (dx / dist) * 60)); // move target back along the direction vector
    target.y = Math.max(target.radius, Math.min(canvas.height - target.radius, target.y + (dy / dist) * 60)); // move target back along the direction vector
    target.staggerTimer = 0.5;
    target.state = "idle";
    target.stateTimer = 0;
  }

  // Zeus — chance to arc to the nearest other living enemy for half damage
  if (player.boons.zeus > 0 && Math.random() < player.boons.zeus * 0.25) { // chance to arc to nearest enemy
    const others = [...shades, ...wretches].filter(e => e !== target && !e.dead); // find other living enemies
    let nearest = null, nearestDist = 150; // arc only reaches nearby enemies
    for (const e of others) { // find the nearest enemy within arc range
      const d = Math.hypot(e.x - target.x, e.y - target.y);// distance to this enemy
      if (d < nearestDist) { nearest = e; nearestDist = d; } // update nearest enemy if closer
    }
    if (nearest) {
      const arcDamage = Math.round(baseDamage / 2);
      nearest.health -= arcDamage; // apply half damage to the nearest enemy
      if (nearest.health <= 0) nearest.dead = true; // mark as dead if health drops to zero
      spawnDamageNumber(nearest.x, nearest.y - nearest.radius - 6, arcDamage, false); // show damage number for arc damage
    }
  }
}

function updateWretch(wretch, dt) {
  if (wretch.dead) return;

  if (wretch.staggerTimer > 0) { // Poseidon stagger overrides normal behavior
    wretch.staggerTimer -= dt;
    return;
  }

  const dx = player.x - wretch.x;
  const dy = player.y - wretch.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (wretch.state === "idle") {
    if (dist >= wretch.aggroRange) return; // player not noticed

    if (dist < wretch.preferredRange) {
      // Too close — back away, then clamp to canvas so it can't retreat off-screen
      const normX = dx / dist, normY = dy / dist;
      wretch.x -= normX * wretch.retreatSpeed * dt;
      wretch.y -= normY * wretch.retreatSpeed * dt;
      wretch.x = Math.max(wretch.radius, Math.min(canvas.width - wretch.radius, wretch.x));
      wretch.y = Math.max(wretch.radius, Math.min(canvas.height - wretch.radius, wretch.y));
    } else if (dist > wretch.preferredRange + 30) {
      // +30 buffer avoids flickering between retreat/telegraph at the boundary
      wretch.state = "telegraph";
      wretch.stateTimer = wretch.telegraphDuration;
    }
    // else: sits in the dead zone and holds still (intentional, prevents jitter)
  }
  else if (wretch.state === "telegraph") {
    wretch.stateTimer -= dt;
    if (wretch.stateTimer <= 0) {
      // Throw fires toward player's position at release — doesn't home in flight
      projectiles.push({
        x: wretch.x, y: wretch.y,
        dirX: dx / dist, dirY: dy / dist,
        speed: 280, radius: 8
      });
      wretch.state = "cooldown";
      wretch.stateTimer = wretch.cooldownDuration;
    }
  }
  else if (wretch.state === "cooldown") {
    wretch.stateTimer -= dt;
    if (wretch.stateTimer <= 0) wretch.state = "idle";
  }
}

function updateProjectiles(dt) {
  // Iterate backwards so splice() doesn't skip the next element
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.dirX * p.speed * dt;
    p.y += p.dirY * p.speed * dt;

    // Off-screen cleanup (20px buffer) — prevents the array growing forever
    if (p.x < -20 || p.x > canvas.width + 20 || p.y < -20 || p.y > canvas.height + 20) {
      projectiles.splice(i, 1);
      continue;
    }

    const dist = Math.sqrt((p.x - player.x) ** 2 + (p.y - player.y) ** 2);
    if (dist < (p.radius + player.radius) && !dash.invulnerable) {
      player.health -= 20; // ranged hit
      spawnDamageNumber(player.x, player.y - player.radius - 8, "-20", false); // show damage number for player hit
      shakeTimer = 0.15;
      projectiles.splice(i, 1); // consumed on hit
    }
  }
}

function updateShade(shade, dt) {
  if (shade.dead) return;

  if (shade.staggerTimer > 0) { // Poseidon stagger overrides normal behavior
    shade.staggerTimer -= dt;
    return;
  }

  const dx = player.x - shade.x;
  const dy = player.y - shade.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (shade.state === "idle") {
    if (dist >= shade.aggroRange) return;

    if (dist > shade.attackRange) {
      // Chase, clamped to canvas bounds
      const normX = dx / dist, normY = dy / dist;
      shade.x += normX * shade.chaseSpeed * dt;
      shade.y += normY * shade.chaseSpeed * dt;
      shade.x = Math.max(shade.radius, Math.min(canvas.width - shade.radius, shade.x));
      shade.y = Math.max(shade.radius, Math.min(canvas.height - shade.radius, shade.y));
    } else {
      shade.state = "telegraph";
      shade.stateTimer = shade.telegraphDuration;
    }
  }
  else if (shade.state === "telegraph") {
    shade.stateTimer -= dt;
    if (shade.stateTimer <= 0) {
      // Lock lunge direction now, so dashing sideways during wind-up can dodge it
      shade.state = "lunge";
      shade.stateTimer = shade.lungeDuration;
      shade.lungeDirX = dx / dist;
      shade.lungeDirY = dy / dist;
    }
  }
  else if (shade.state === "lunge") {
    shade.stateTimer -= dt;
    shade.x += shade.lungeDirX * shade.lungeSpeed * dt;
    shade.y += shade.lungeDirY * shade.lungeSpeed * dt;
    if (shade.stateTimer <= 0) {
      shade.state = "cooldown";
      shade.stateTimer = shade.cooldownDuration;
    }
  }
  else if (shade.state === "cooldown") {
    shade.stateTimer -= dt;
    if (shade.stateTimer <= 0) shade.state = "idle";
  }
}

// Melee hit check — works for the Shade or the Wretch, since both share
// hitThisSwing / health / dead fields
function checkPlayerAttackHitsEnemy(enemy) {
  if (enemy.dead) return;

  if (attackTimer <= 0) {
    enemy.hitThisSwing = false; // reset so the next swing can land
    return;
  }

  // Same hitbox position formula used in render(), so hit detection matches what's drawn
  const hitboxX = player.x + Math.cos(player.facing) * attackRange;
  const hitboxY = player.y + Math.sin(player.facing) * attackRange;
  const dx = hitboxX - enemy.x;
  const dy = hitboxY - enemy.y;
  const distance = Math.sqrt(dx * dx + dy * dy);

  if (distance < (10 + enemy.radius) && !enemy.hitThisSwing) { // 10 = hitbox visual radius
    enemy.hitThisSwing = true;
    applyBoonEffects(enemy, PRIMARY_ATTACK_DAMAGE);
  }
}

function checkShadesHitPlayer() {
  for (const shade of shades) {
    if (shade.dead) continue;

    // Contact damage only during an active lunge (telegraph is the warning, not a hit)
    if (shade.state !== "lunge") {
      shade.hitPlayerThisLunge = false;
      continue;
    }

    const distance = Math.sqrt((player.x - shade.x) ** 2 + (player.y - shade.y) ** 2);
    if (distance < (player.radius + shade.radius) && !shade.hitPlayerThisLunge && !dash.invulnerable) {
      player.health -= 15;
      spawnDamageNumber(player.x, player.y - player.radius - 8, "-15", false); // show damage number for player hit
      shakeTimer = 0.15;
      shade.hitPlayerThisLunge = true;
    }
  }
}

function gameLoop(now) {
  const dt = (now - lastTime) / 1000; // seconds since last frame — keeps speeds framerate-independent
  lastTime = now;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  if (shakeTimer > 0) shakeTimer -= dt; // decrement shake timer
  if (slashFlashTimer > 0) slashFlashTimer -= dt;  // decrement slash flash timer
  for (let i = damageNumbers.length - 1; i >= 0; i--) {
    const dn = damageNumbers[i]; // get the current damage number
    dn.y -= dn.speed * dt; // move the damage number upward
    dn.timer -= dt; // decrement the timer for this damage number
    if (dn.timer <= 0) damageNumbers.splice(i, 1); // remove the damage number when its timer expires
  }
  if (gamePhase !== "fighting") return; // freeze combat during boon pick / won / lost
  // FIX: removed the duplicate copy of this same line that was here

  // --- Movement ---
  if (keys["w"] || keys["arrowup"]) player.y -= player.speed * dt;
  if (keys["s"] || keys["arrowdown"]) player.y += player.speed * dt;
  if (keys["a"] || keys["arrowleft"]) player.x -= player.speed * dt;
  if (keys["d"] || keys["arrowright"]) player.x += player.speed * dt;

  // --- Facing (toward mouse) ---
  player.facing = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  if (attackTimer > 0) attackTimer -= dt;

  // --- Dash ---
  if (dash.active) {
    dash.timer -= dt;
    if (dash.timer <= 0) {
      dash.active = false;
      dash.invulnerable = false;
      dash.cooldown = dash.cooldownDuration;
    } else {
      player.x += dash.dirX * dash.speed * dt;
      player.y += dash.dirY * dash.speed * dt;
    }
  } else if (dash.cooldown > 0) {
    dash.cooldown -= dt;
  }

  // --- Enemies & combat ---
  for (const shade of shades) {
    updateShade(shade, dt);
    checkPlayerAttackHitsEnemy(shade);
  }
  checkShadesHitPlayer();

  for (const wretch of wretches) {
    updateWretch(wretch, dt);
    checkPlayerAttackHitsEnemy(wretch);
  }
  updateProjectiles(dt);

  if (player.health <= 0) {
    gamePhase = "lost";
    return;
  }

  checkRoundClear();
}

function drawEnemy(enemy, telegraphColor, normalColor) {
  if (enemy.dead) return;
  ctx.beginPath();
  ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
  ctx.fillStyle = enemy.staggerTimer > 0 ? "#ffffff" : (enemy.state === "telegraph" ? telegraphColor : normalColor);
  ctx.fill();

  const barWidth = 40;
  const pct = enemy.health / enemy.maxHealth;
  ctx.fillStyle = "#333";
  ctx.fillRect(enemy.x - barWidth / 2, enemy.y - enemy.radius - 12, barWidth, 6);
  ctx.fillStyle = "#4caf50";
  ctx.fillRect(enemy.x - barWidth / 2, enemy.y - enemy.radius - 12, barWidth * pct, 6);
}

function renderHUD() {
  // Player health bar (fixed corner position, unlike enemy bars which float above them)
  const playerBarWidth = 200;
  ctx.fillStyle = "#333";
  ctx.fillRect(20, 20, playerBarWidth, 16);
  ctx.fillStyle = "#e05050";
  ctx.fillRect(20, 20, playerBarWidth * (player.health / player.maxHealth), 16);

  // Round indicator
  ctx.fillStyle = "#ffffff";
  ctx.font = "18px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("Round " + (roundIndex + 1) + " / " + ROUNDS.length, 20, 56);

  // Boon level icons
  ctx.font = "14px sans-serif";
  let bx = 20;
  for (const b of BOONS) {
    const lvl = player.boons[b.id];
    if (lvl > 0) {
      ctx.fillStyle = b.color;
      ctx.fillText(b.name.split(" — ")[0] + " x" + lvl, bx, 78);
      bx += 130;
    }
  }
}

// FIX: damageNumbers were being updated (moved + expired) but never drawn.
function renderDamageNumbers() {
  ctx.textAlign = "center";
  ctx.font = "16px sans-serif";
  for (const dn of damageNumbers) {
    const alpha = Math.max(0, Math.min(1, dn.timer / 0.6));
    ctx.fillStyle = dn.crit
      ? `rgba(255, 215, 0, ${alpha})`   // gold for crits
      : `rgba(255, 255, 255, ${alpha})`;
    ctx.font = dn.crit ? "bold 18px sans-serif" : "16px sans-serif";
    ctx.fillText(String(dn.value), dn.x, dn.y);
  }
}

function renderBoonScreen() {
  ctx.fillStyle = "rgba(0,0,0,0.75)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ffffff";
  ctx.font = "28px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("Choose a Boon", canvas.width / 2, 100);

  boonCardRects = [];
  const cardW = 220, cardH = 260, gap = 30;
  const totalW = cardW * 3 + gap * 2;
  const startX = (canvas.width - totalW) / 2;
  const cardY = 160;

  BOONS.forEach((boon, i) => {
    const cx = startX + i * (cardW + gap); // X position for this boon card
    boonCardRects.push({ x: cx, y: cardY, w: cardW, h: cardH, id: boon.id }); // Store the rectangle for click detection

    ctx.fillStyle = "#2a2230";
    ctx.fillRect(cx, cardY, cardW, cardH);
    ctx.strokeStyle = boon.color;
    ctx.lineWidth = 3;
    ctx.strokeRect(cx, cardY, cardW, cardH);

    ctx.fillStyle = boon.color;
    ctx.beginPath();
    ctx.arc(cx + cardW / 2, cardY + 60, 30, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#ffffff";
    ctx.font = "16px sans-serif";
    wrapText(boon.name, cx + cardW / 2, cardY + 120, cardW - 20, 20);

    ctx.font = "13px sans-serif";
    ctx.fillStyle = "#cccccc";
    wrapText(boon.desc, cx + cardW / 2, cardY + 170, cardW - 30, 18);

    const lvl = player.boons[boon.id];
    if (lvl > 0) {
      ctx.fillStyle = boon.color;
      ctx.font = "12px sans-serif";
      ctx.fillText("Currently level " + lvl, cx + cardW / 2, cardY + cardH - 20);
    }
  });
}

// Simple centered word-wrap helper for boon card text
function wrapText(text, cx, y, maxWidth, lineHeight) {
  const words = text.split(" ");
  let line = "";
  let lines = [];
  for (const word of words) {
    const test = line + word + " ";
    if (ctx.measureText(test).width > maxWidth && line !== "") {
      lines.push(line);
      line = word + " ";
    } else {
      line = test;
    }
  }
  lines.push(line);
  ctx.textAlign = "center";
  lines.forEach((l, i) => ctx.fillText(l.trim(), cx, y + i * lineHeight));
}

function renderEndScreen(text) {
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ffffff";
  ctx.font = "48px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
}

function render() {
  ctx.save(); // FIX: needed so shake translate doesn't stack forever across frames

  // FIX: shakeTimer now actually does something — small random jitter
  if (shakeTimer > 0) {
    const dx = (Math.random() * 2 - 1) * shakeMagnitude;
    const dy = (Math.random() * 2 - 1) * shakeMagnitude;
    ctx.translate(dx, dy);
  }

  ctx.clearRect(-shakeMagnitude, -shakeMagnitude, canvas.width + shakeMagnitude * 2, canvas.height + shakeMagnitude * 2);

  // Facing indicator (aim line toward mouse)
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(player.x + Math.cos(player.facing) * 30, player.y + Math.sin(player.facing) * 30);
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 3;
  ctx.stroke();

  // Attack hitbox, visible only during its short active window
  if (attackTimer > 0) {
    const hitboxX = player.x + Math.cos(player.facing) * attackRange;
    const hitboxY = player.y + Math.sin(player.facing) * attackRange;
    ctx.beginPath();
    ctx.arc(hitboxX, hitboxY, 10, 0, Math.PI * 2);
    ctx.fillStyle = slashFlashTimer > 0 ? "rgba(255, 255, 255, 0.8)" : "rgba(255, 0, 0, 0.5)"; // FIX: slashFlashTimer now visually does something
    ctx.fill();
  }

  for (const shade of shades) drawEnemy(shade, "#ff8080", "#a03030");
  for (const wretch of wretches) drawEnemy(wretch, "#c080ff", "#8040c0");

  for (const p of projectiles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#c080ff";
    ctx.fill();
  }

  // Player sprite — falls back to a gold circle if the image hasn't loaded
  // (or failed), since drawImage() on a broken image would throw and freeze render()
  const imgSize = player.radius * 3;
  if (characterImg.complete && characterImg.naturalWidth > 0) {
    ctx.drawImage(characterImg, player.x - imgSize / 2, player.y - imgSize / 2, imgSize, imgSize);
  } else {
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#e0c060";
    ctx.fill();
  }

  renderDamageNumbers(); // FIX: was never called before
  renderHUD();

  if (gamePhase === "boon") renderBoonScreen();
  else if (gamePhase === "won") renderEndScreen("VICTORY");
  else if (gamePhase === "lost") renderEndScreen("YOU DIED");

  ctx.restore(); // FIX: pairs with ctx.save() above
}

function handleRestartClick(e) {
  if (!restartButtonRect) return;
  const rect = canvas.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;
  const b = restartButtonRect;

  if (clickX >= b.x && clickX <= b.x + b.w && clickY >= b.y && clickY <= b.y + b.h) {
    resetGame();
  }
}

// Puts everything back to a fresh Round 1 — health, position, boons, and all (damage numbers, shake, flash) that could otherwise carry over
function resetGame() {
  player.health = player.maxHealth; // reset player health to full
  player.x = 450; // reset player position to center of the canvas horizontally
  player.y = 280; // reset player position to center of the canvas vertically
  player.boons = { zeus: 0, poseidon: 0, artemis: 0 };

  attackTimer = 0; // reset attack timer
  dash.active = false; // reset dash state
  dash.timer = 0; // reset dash timer
  dash.cooldown = 0; // reset dash cooldown
  dash.invulnerable = false; // reset dash invulnerability

  damageNumbers.length = 0; // clear damage numbers
  shakeTimer = 0; // reset screen shake
  slashFlashTimer = 0; // reset slash flash

  roundIndex = 0;
  spawnRound(0); // also sets gamePhase back to "fighting"
}

function renderEndScreen(text) { // shows the end screen with a "Try Again" button
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ffffff";
  ctx.font = "48px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(text, canvas.width / 2, canvas.height / 2 - 20);

  // Try Again button — same click-rect pattern as the boon cards
  const btnW = 180, btnH = 50;
  const btnX = canvas.width / 2 - btnW / 2;
  const btnY = canvas.height / 2 + 20;
  restartButtonRect = { x: btnX, y: btnY, w: btnW, h: btnH };

  ctx.fillStyle = "#4caf50";
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2;
  ctx.strokeRect(btnX, btnY, btnW, btnH);

  ctx.fillStyle = "#ffffff";
  ctx.font = "20px sans-serif";
  ctx.fillText("Try Again", canvas.width / 2, btnY + btnH / 2 + 7);
}

requestAnimationFrame(gameLoop);
</script>
