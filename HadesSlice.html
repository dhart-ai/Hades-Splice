<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; background:#0e0a12; }
  canvas { display:block; margin:40px auto; background:#1c1620; border:2px solid #7a5a2a; }
</style>
</head>
<body>
<canvas id="canvas" width="900" height="560"></canvas>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let lastTime = performance.now();

// --- Player ---
const player = {
  x: 450,
  y: 280,
  radius: 16,
  speed: 220,
  facing: 0 // angle in radians, toward the mouse
};

// --- Mouse tracking ---
const mouse = { x: 0, y: 0 };
canvas.addEventListener("mousemove", (e) => {// Get mouse position relative to canvas
  const rect = canvas.getBoundingClientRect(); // Get canvas position
  mouse.x = e.clientX - rect.left; // Get mouse position relative to canvas
  mouse.y = e.clientY - rect.top; 
});

// --- Attack state ---
let attackTimer = 0; // counts down while attack is active
const attackDuration = 0.15; // seconds the hitbox is visible
const attackRange = 50; // how far in front of the player it appears

canvas.addEventListener("click", () => {
  if (attackTimer <= 0) {
    attackTimer = attackDuration;
  }
});


// --- Input tracking ---
const keys = {};
window.addEventListener("keydown", (e) => {
  keys[e.key.toLowerCase()] = true;
});
window.addEventListener("keyup", (e) => {
  keys[e.key.toLowerCase()] = false;
});

// --- Dash state ---
const dash = {
  active: false,
  timer: 0,
  duration: 0.2,      // how long the dash lasts
  speed: 600,          // pixels per second while dashing
  cooldown: 0,         // counts down after a dash ends
  cooldownDuration: 0.5,
  dirX: 0,
  dirY: 0,
  invulnerable: false  // true while dashing = i-frames
};

window.addEventListener("keydown", (e) => {
  if (e.key === " " ) {
    if (!dash.active && dash.cooldown <= 0) {
      dash.active = true;
      dash.timer = dash.duration;
      dash.invulnerable = true;

      // Determine dash direction
      let dirX = 0;
      let dirY = 0;
      if (keys["w"] || keys["arrowup"]) dirY -= 1;
      if (keys["s"] || keys["arrowdown"]) dirY += 1;
      if (keys["a"] || keys["arrowleft"]) dirX -= 1;
      if (keys["d"] || keys["arrowright"]) dirX += 1;

      // If no movement keys are pressed, use facing direction
      if (dirX === 0 && dirY === 0) {
        dirX = Math.cos(player.facing);
        dirY = Math.sin(player.facing);
      }

      // Normalize the direction vector
      const length = Math.sqrt(dirX * dirX + dirY * dirY);
      if (length > 0) {
        dash.dirX = dirX / length;
        dash.dirY = dirY / length;
      } else {
        dash.dirX = 0;
        dash.dirY = 0;
      }
    }
  }
});

function gameLoop(now) {
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

function update(dt) {
    if (keys["w"] || keys["arrowup"]) {
        player.y -= player.speed * dt;
    }
    if (keys["s"] || keys["arrowdown"]) {
        player.y += player.speed * dt;
    }
    if (keys["a"] || keys["arrowleft"]) {
        player.x -= player.speed * dt;
    }
    if (keys["d"] || keys["arrowright"]) {
        player.x += player.speed * dt;
    }
    const deltaX = mouse.x - player.x;
    const deltaY = mouse.y - player.y;
    player.facing = Math.atan2(deltaY, deltaX);

    if (attackTimer > 0) {
        attackTimer -= dt;
    }

    if (dash.active) { // If dash is active, move the player in the dash direction
        dash.timer -= dt; // Decrease the dash timer
        if (dash.timer <= 0) { // If dash duration is over, reset dash state
            dash.active = false;
            dash.invulnerable = false;
            dash.cooldown = dash.cooldownDuration;// Start the cooldown timer
        } else {
            player.x += dash.dirX * dash.speed * dt; // Move the player in the dash direction
            player.y += dash.dirY * dash.speed * dt;
        }
    } else if (dash.cooldown > 0) { // If dash is not active but cooldown is still running, decrease the cooldown timer
        dash.cooldown -= dt; // Decrease the cooldown timer
    }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);// Draw player by using ctx.arc() with player.x, player.y, and player.radius
  ctx.fillStyle = "#e0c060";    
  ctx.fill();

  // Facing indicator line
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(
    player.x + Math.cos(player.facing) * 30,
    player.y + Math.sin(player.facing) * 30
  );
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 3;
  ctx.stroke();

  if (attackTimer > 0) {
    const hitboxX = player.x + Math.cos(player.facing) * attackRange;
    const hitboxY = player.y + Math.sin(player.facing) * attackRange;
    ctx.beginPath();
    ctx.arc(hitboxX, hitboxY, 10, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
    ctx.fill();
  }
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
