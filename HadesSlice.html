<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; background:#0e0a12; }
  canvas { display:block; margin:40px auto; background:#1c1620; border:2px solid #7a5a2a; }
</style>
</head>
<body>
<canvas id="canvas" width="900" height="560"></canvas>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let lastTime = performance.now();
let gameOver = false;

// --- Assets ---
const characterImg = new Image();
characterImg.src = "character_transparent.png"; // must be in the same folder as this HTML file

// --- Player ---
const player = {
  x: 450,
  y: 280,
  radius: 16,
  speed: 220,
  facing: 0, // angle in radians, toward the mouse
  health: 100,
  maxHealth: 100
};

// --- Mouse tracking ---
const mouse = { x: 0, y: 0 };
canvas.addEventListener("mousemove", (e) => { // Get mouse position relative to canvas
  const rect = canvas.getBoundingClientRect(); // Get canvas position
  mouse.x = e.clientX - rect.left; // Get mouse position relative to canvas
  mouse.y = e.clientY - rect.top;
});

// --- Attack state ---
let attackTimer = 0; // counts down while attack is active
const attackDuration = 0.15; // seconds the hitbox is visible
const attackRange = 50; // how far in front of the player it appears

canvas.addEventListener("click", () => {
  if (attackTimer <= 0) {
    attackTimer = attackDuration;
  }
});

// --- Input tracking ---
const keys = {};
window.addEventListener("keydown", (e) => {
  keys[e.key.toLowerCase()] = true;
});
window.addEventListener("keyup", (e) => {
  keys[e.key.toLowerCase()] = false;
});

// --- Dash state ---
const dash = {
  active: false,
  timer: 0,
  duration: 0.2,      // how long the dash lasts
  speed: 600,          // pixels per second while dashing
  cooldown: 0,         // counts down after a dash ends
  cooldownDuration: 0.5,
  dirX: 0,
  dirY: 0,
  invulnerable: false  // true while dashing = i-frames
};

window.addEventListener("keydown", (e) => {
  if (e.key === " ") {
    if (!dash.active && dash.cooldown <= 0) {
      dash.active = true;
      dash.timer = dash.duration;
      dash.invulnerable = true;

      // Determine dash direction
      let dirX = 0;
      let dirY = 0;
      if (keys["w"] || keys["arrowup"]) dirY -= 1;
      if (keys["s"] || keys["arrowdown"]) dirY += 1;
      if (keys["a"] || keys["arrowleft"]) dirX -= 1;
      if (keys["d"] || keys["arrowright"]) dirX += 1;

      // If no movement keys are pressed, use facing direction
      if (dirX === 0 && dirY === 0) {
        dirX = Math.cos(player.facing);
        dirY = Math.sin(player.facing);
      }

      // Normalize the direction vector
      const length = Math.sqrt(dirX * dirX + dirY * dirY);
      if (length > 0) {
        dash.dirX = dirX / length;
        dash.dirY = dirY / length;
      } else {
        dash.dirX = 0;
        dash.dirY = 0;
      }
    }
  }
});

// --- Shade enemy ---
const shade = {
  x: 700,
  y: 150,
  radius: 18,
  state: "idle",       // "idle" | "telegraph" | "lunge" | "cooldown"
  stateTimer: 0,
  telegraphDuration: 0.6,
  lungeDuration: 0.25,
  lungeSpeed: 500,
  cooldownDuration: 0.8,
  lungeDirX: 0,
  lungeDirY: 0,
  chaseSpeed: 120,
  aggroRange: 400,     // distance at which it notices the player
  attackRange: 60,     // distance at which it starts telegraphing instead of chasing
  health: 40,
  maxHealth: 40,
  hitThisSwing: false,       // prevents one attack from hitting multiple times
  hitPlayerThisLunge: false, // prevents one lunge from hitting the player multiple times
  dead: false
};

function updateShade(dt) {
  if (shade.dead) return;

  const dx = player.x - shade.x;
  const dy = player.y - shade.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  // ... rest stays the same
  if (shade.state === "idle") {
    if (dist < shade.aggroRange) { // Player is within aggro range
      if (dist > shade.attackRange) { // Player is outside attack range, chase the player
        const normX = dx / dist; // making the vector have a length of 1
        const normY = dy / dist;
        shade.x += normX * shade.chaseSpeed * dt;
        shade.y += normY * shade.chaseSpeed * dt; // Move shade toward the player
      } else {
        // Start telegraphing
        shade.state = "telegraph";
        shade.stateTimer = shade.telegraphDuration;
      }
    }
  }
  else if (shade.state === "telegraph") {
    shade.stateTimer -= dt; // Count down the telegraph timer
    if (shade.stateTimer <= 0) { // Telegraphing is done, start lunging
      shade.state = "lunge"; // Change state to lunge
      shade.stateTimer = shade.lungeDuration;
      const normX = dx / dist;
      const normY = dy / dist;
      shade.lungeDirX = normX;
      shade.lungeDirY = normY; // Store the current direction toward the player
    }
  }
  else if (shade.state === "lunge") {
    shade.stateTimer -= dt; // Count down the lunge timer
    shade.x += shade.lungeDirX * shade.lungeSpeed * dt;
    shade.y += shade.lungeDirY * shade.lungeSpeed * dt;
    if (shade.stateTimer <= 0) { // Lunge is done, start cooldown
      shade.state = "cooldown";
      shade.stateTimer = shade.cooldownDuration;
    }
  }
  else if (shade.state === "cooldown") {
    shade.stateTimer -= dt; // Count down the cooldown timer
    if (shade.stateTimer <= 0) { // Cooldown is done, return to idle
      shade.state = "idle";
    }
  }
}


function checkPlayerAttackHitsShade() {
  if (attackTimer <= 0) {
    shade.hitThisSwing = false;
    return;
  }
  const hitboxX = player.x + Math.cos(player.facing) * attackRange;
  const hitboxY = player.y + Math.sin(player.facing) * attackRange;// calculate distance between (hitboxX, hitboxY) and (shade.x, shade.y)

  const dx = hitboxX - shade.x;
  const dy = hitboxY - shade.y;
  const distance = Math.sqrt(dx * dx + dy * dy);

  if (distance < (10 + shade.radius) && !shade.hitThisSwing) {
    shade.health -= 10;
    shade.hitThisSwing = true;
    if (shade.health <= 0) {
      shade.dead = true;
    }
  }
}

function checkShadeHitsPlayer() {
  if (shade.dead) return;

  if (shade.state !== "lunge") {
    shade.hitPlayerThisLunge = false; // the NEXT lunge is able to hit again
    return;
  }
  const distance = Math.sqrt((player.x - shade.x) ** 2 + (player.y - shade.y) ** 2);

  if (distance < (player.radius + shade.radius) && !shade.hitPlayerThisLunge && !dash.invulnerable) {
    player.health -= 15; // Subtract damage from player health
    shade.hitPlayerThisLunge = true; // Mark that the shade has hit the player this lunge
  } 
}

function gameLoop(now) {
  const dt = (now - lastTime) / 1000; // Convert milliseconds to seconds
  lastTime = now; // Update lastTime for the next frame

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

function update(dt) {
  if (gameOver) return;
  if (keys["w"] || keys["arrowup"]) {
    player.y -= player.speed * dt;
  }
  if (keys["s"] || keys["arrowdown"]) {
    player.y += player.speed * dt;
  }
  if (keys["a"] || keys["arrowleft"]) {
    player.x -= player.speed * dt;
  }
  if (keys["d"] || keys["arrowright"]) {
    player.x += player.speed * dt;
  }

  const deltaX = mouse.x - player.x;
  const deltaY = mouse.y - player.y;
  player.facing = Math.atan2(deltaY, deltaX);

  if (attackTimer > 0) {
    attackTimer -= dt;
  }

  if (dash.active) { // If dash is active, move the player in the dash direction
    dash.timer -= dt; // Decrease the dash timer
    if (dash.timer <= 0) { // If dash duration is over, reset dash state
      dash.active = false;
      dash.invulnerable = false;
      dash.cooldown = dash.cooldownDuration; // Start the cooldown timer
    } else {
      player.x += dash.dirX * dash.speed * dt; // Move the player in the dash direction
      player.y += dash.dirY * dash.speed * dt;
    }
  } else if (dash.cooldown > 0) { // If dash is not active but cooldown is still running, decrease it
    dash.cooldown -= dt;
  }

  updateShade(dt);
  checkPlayerAttackHitsShade();
  checkShadeHitsPlayer();

  // Lose condition: player health depleted
  if (player.health <= 0) {
    gameOver = true;
  }
}


function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);


  // Facing indicator line
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(
    player.x + Math.cos(player.facing) * 30,
    player.y + Math.sin(player.facing) * 30
  );
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 3;
  ctx.stroke();

  // Attack hitbox (only while attacking)
  if (attackTimer > 0) {
    const hitboxX = player.x + Math.cos(player.facing) * attackRange;
    const hitboxY = player.y + Math.sin(player.facing) * attackRange;
    ctx.beginPath();
    ctx.arc(hitboxX, hitboxY, 10, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
    ctx.fill();
  }

  // Draw Shade (only while alive)
  if (!shade.dead) {
    ctx.beginPath();
    ctx.arc(shade.x, shade.y, shade.radius, 0, Math.PI * 2);
    ctx.fillStyle = shade.state === "telegraph" ? "#ff8080" : "#a03030";
    ctx.fill();

    // Shade health bar
    const barWidth = 40;
    const healthPercent = shade.health / shade.maxHealth; // Calculate health percentage by dividing current health by max health
    ctx.fillStyle = "#333";
    ctx.fillRect(shade.x - barWidth / 2, shade.y - shade.radius - 12, barWidth, 6); // background bar
    ctx.fillStyle = "#4caf50";
    ctx.fillRect(shade.x - barWidth / 2, shade.y - shade.radius - 12, barWidth * healthPercent, 6);
  }

  // Player health bar (top-left corner)
  const playerBarWidth = 200;
  const playerHealthPercent = player.health / player.maxHealth; // Calculate health percentage by dividing current health by max health
  ctx.fillStyle = "#333";
  ctx.fillRect(20, 20, playerBarWidth, 16);
  ctx.fillStyle = "#e05050";
  ctx.fillRect(20, 20, playerBarWidth * playerHealthPercent, 16);

  // Game over overlay
  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ffffff";
    ctx.font = "48px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("YOU DIED", canvas.width / 2, canvas.height / 2);
  }
  // Draw player using the character image
  const imgHeight = player.radius * 4; // pick a height that looks right
  const imgWidth = imgHeight * (characterImg.width / characterImg.height);
  ctx.drawImage(
    characterImg,
    player.x - imgWidth / 2,
    player.y - imgHeight / 2,
    imgWidth,
    imgHeight
  );
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
